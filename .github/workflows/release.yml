name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      snapshot:
        description: 'Build as snapshot (no publish)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '22'

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: cli-tool-center-windows-amd64
            package: zip

          - os: ubuntu-latest
            platform: linux/amd64
            artifact: cli-tool-center-linux-amd64
            package: tar.gz

          - os: macos-13
            platform: darwin/amd64
            artifact: cli-tool-center-darwin-amd64
            package: zip

          - os: macos-latest
            platform: darwin/arm64
            artifact: cli-tool-center-darwin-arm64
            package: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Build Wails binary
        run: wails build -platform ${{ matrix.platform }} -ldflags "-w -s -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}"

      - name: Package artifact (Windows)
        if: matrix.package == 'zip' && runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          $files = Get-ChildItem -Path build/bin -Recurse
          Compress-Archive -Path $files.FullName -DestinationPath dist/${{ matrix.artifact }}.zip

      - name: Package artifact (macOS)
        if: matrix.package == 'zip' && runner.os == 'macOS'
        run: |
          mkdir -p dist
          ditto -c -k --keepParent build/bin dist/${{ matrix.artifact }}.zip

      - name: Package artifact (Linux)
        if: matrix.package == 'tar.gz'
        run: |
          mkdir -p dist
          tar -czf dist/${{ matrix.artifact }}.tar.gz -C build/bin .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') && !inputs.snapshot
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cli-tool-center-*
          merge-multiple: true

      - name: List release files
        run: ls -lah dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
