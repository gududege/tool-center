name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      snapshot:
        description: 'Build as snapshot (no publish)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '22'

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: cli-tool-center-windows-amd64
            package: zip

          - os: ubuntu-latest
            platform: linux/amd64
            artifact: cli-tool-center-linux-amd64
            package: tar.gz

          - os: macos-latest
            platform: darwin/arm64
            artifact: cli-tool-center-darwin-arm64
            package: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Build Wails binary
        run: wails build -tags webkit2_41 -platform ${{ matrix.platform }} -ldflags "-w -s -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}"

      - name: Build cli-print tool and copy files to build/bin
        shell: bash
        run: |
          cli_print_binary="cli-print"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cli_print_binary="cli-print.exe"
          fi
          go build -o "plugins/cli-print-demo/${cli_print_binary}" ./tool/cli-print/
          mkdir -p build/bin/plugins
          cp -r plugins/* build/bin/plugins/
          cp -r docs build/bin/

      - name: Install UPX (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y upx

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx --no-progress

      - name: Compress binary with UPX
        if: runner.os != 'macOS'
        shell: bash
        run: |
          binary_name="cli-tool-center"
          if [ "${{ runner.os }}" = "Windows" ]; then
            binary_name="cli-tool-center.exe"
          fi
          upx "build/bin/${binary_name}"

      - name: Package artifact (Windows)
        if: matrix.package == 'zip' && runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory(
            (Resolve-Path build/bin).Path,
            "dist/${{ matrix.artifact }}.zip",
            [System.IO.Compression.CompressionLevel]::Optimal,
            $false
          )

      - name: Package artifact (macOS)
        if: matrix.package == 'zip' && runner.os == 'macOS'
        run: |
          mkdir -p dist
          ditto -c -k build/bin dist/${{ matrix.artifact }}.zip

      - name: Package artifact (Linux)
        if: matrix.package == 'tar.gz'
        run: |
          mkdir -p dist
          tar -czf dist/${{ matrix.artifact }}.tar.gz -C build/bin .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') && !inputs.snapshot
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: cli-tool-center-*
          merge-multiple: true

      - name: List release files
        run: ls -lah dist

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
